name = "nadervpn-subscription"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./public"

[[d1_databases]]
binding = "DB"
database_name = "nadervpn-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

[vars]
ADMIN_PASSWORD_HASH = "$2b$10$placeholder_hash_please_update"
DEFAULT_LANGUAGE = "fa"
DEFAULT_THEME = "dark"
